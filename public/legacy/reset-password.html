<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reinitialiser le mot de passe — Raktakk</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23FF5A1F' width='100' height='100' rx='22'/><text y='.9em' font-size='70' x='12'>R</text></svg>" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    body { background: var(--bg-base); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .card { background: var(--bg-white); border-radius: var(--radius-xl); border: 1px solid var(--border-light); padding: 40px; width: 100%; max-width: 460px; box-shadow: var(--shadow-lg); }
    .muted { color: var(--text-muted); font-size: .88rem; }
  </style>
</head>
<body>
  <div class="card">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:2rem;margin-bottom:8px;">🔐</div>
      <h1 style="font-size:1.3rem;font-weight:800;margin-bottom:6px;">Reinitialiser le mot de passe</h1>
      <p class="muted" id="subtitle">Entrez votre email pour recevoir un lien de reinitialisation.</p>
    </div>

    <div id="request-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="reset-email" placeholder="vous@email.com" required />
      </div>
      <button class="btn btn-primary w-full btn-lg" id="reset-btn">Envoyer le lien</button>
    </div>

    <div id="update-form" style="display:none;">
      <div class="form-group">
        <label class="form-label">Nouveau mot de passe</label>
        <input class="form-input" type="password" id="new-password" placeholder="Min. 8 caracteres" required />
      </div>
      <div class="form-group">
        <label class="form-label">Confirmer</label>
        <input class="form-input" type="password" id="confirm-password" placeholder="Confirmer" required />
      </div>
      <button class="btn btn-primary w-full btn-lg" id="update-btn">Mettre a jour</button>
    </div>

    <div style="text-align:center;margin-top:20px;">
      <a href="login.html" style="color:var(--brand-primary);font-weight:600;">Retour a la connexion</a>
    </div>
  </div>

  <div class="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-config.js"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script>
    function showToast(msg, type = 'info') {
      let container = document.querySelector('.toast-container');
      if (!container) {
        container = document.createElement('div');
        container.className = 'toast-container';
        document.body.appendChild(container);
      }
      const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `<span class="toast-icon">${icons[type] || 'ℹ️'}</span><span class="toast-msg">${msg}</span><span class="toast-close" onclick="this.parentElement.remove()">✕</span>`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 4500);
    }

    async function initReset() {
      const params = new URLSearchParams(window.location.search);
      const isRecovery = params.get('type') === 'recovery' || window.location.hash.includes('access_token');
      const requestForm = document.getElementById('request-form');
      const updateForm = document.getElementById('update-form');
      const subtitle = document.getElementById('subtitle');

      if (isRecovery) {
        requestForm.style.display = 'none';
        updateForm.style.display = 'block';
        subtitle.textContent = 'Choisissez un nouveau mot de passe.';
      }

      document.getElementById('reset-btn').addEventListener('click', async () => {
        try {
          if (!window.RAKTAKK_API) throw new Error('Configuration Supabase absente.');
          const email = document.getElementById('reset-email').value.trim();
          if (!email) throw new Error('Email obligatoire.');
          await window.RAKTAKK_API.requestPasswordReset(email);
          showToast('Lien envoye. Verifiez votre boite mail.', 'success');
        } catch (err) {
          showToast(err.message || 'Envoi impossible', 'error');
        }
      });

      document.getElementById('update-btn').addEventListener('click', async () => {
        try {
          if (!window.RAKTAKK_API) throw new Error('Configuration Supabase absente.');
          const pw = document.getElementById('new-password').value.trim();
          const confirm = document.getElementById('confirm-password').value.trim();
          if (pw.length < 8) throw new Error('Le mot de passe doit contenir au moins 8 caracteres.');
          if (pw !== confirm) throw new Error('Les mots de passe ne correspondent pas.');
          await window.RAKTAKK_API.updatePassword(pw);
          showToast('Mot de passe mis a jour. Vous pouvez vous connecter.', 'success');
          setTimeout(() => { window.location.href = 'login.html'; }, 1200);
        } catch (err) {
          showToast(err.message || 'Mise a jour impossible', 'error');
        }
      });
    }

    initReset();
  </script>
</body>
</html>
